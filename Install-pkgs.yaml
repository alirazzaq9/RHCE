---
- name: Install package
  hosts: dev
  tasks: 
    - name: install package
      yum: 
        name: wget
        state: present

- name: Install RPM Development tools
  hosts: test
  tasks: 
    - name: install group install
      yum: 
        name: "@RPM Development Tools"
        state: present

- name: patch the system
  hosts: prod
  tasks: 
    - name: update system
      yum:
        name: '*'
        state: latest
