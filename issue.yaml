---
- name: create issue files
  hosts: all
  tasks: 
    - name: Print Hello when true
      when: 'ansible_facts.os_family== "RedHat"'
      debug:
        msg: "Hello"

    - name:
      when: "inventory_hostname in groups.dev"
      copy:
        content: "development"
        dest: /etc/issues

    - name:
      when: "inventory_hostname in groups.test"
      copy:
        content: "test"
        dest: /etc/issues

    - name:
      when: "inventory_hostname in groups.prod"
      copy:
        content: "production"
        dest: /etc/issues
